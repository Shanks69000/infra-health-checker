name: Infrastructure Health Check

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: infra-health-checker-main
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  check:
    name: Run health checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run checker
        run: python checker.py || true
      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git stash --include-untracked
          git pull --rebase origin main
          git stash pop || true
          git add reports/
          git diff --cached --quiet || git commit -m "report: health check $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/shanks69000/infra-health-checker:latest
            ghcr.io/shanks69000/infra-health-checker:${{ github.sha }}